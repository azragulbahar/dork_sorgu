<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DorkSorgu | Otomasyon Paneli</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --primary: #58a6ff;
            --success: #3fb950;
            --danger: #ff7b72;
            --warning: #d29922;
            --backup: #f6993f;
        }

        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 900px; margin: auto; }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #8b949e; font-size: 14px; }

        .search-container {
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input, select {
            background: #010409;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }
        input { flex: 2; }
        select { flex: 1; }

        button {
            background: var(--success);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 4px; }

        .info-note {
            text-align: center;
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(48, 54, 61, 0.2);
            border-radius: 6px;
        }

    
        .dork-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .dork-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: bold;
            float: right;
            border: 1px solid;
            text-transform: uppercase;
        }

        .badge-Giris { color: var(--success); border-color: var(--success); background: rgba(63,185,80,0.1); }
        .badge-Gizli { color: var(--danger); border-color: var(--danger); background: rgba(255,123,114,0.1); }
        .badge-Hata { color: var(--warning); border-color: var(--warning); background: rgba(210,153,34,0.1); }
        .badge-Dosya { color: var(--primary); border-color: var(--primary); background: rgba(88,165,255,0.1); }
        .badge-Sistem { color: #bc8cff; border-color: #bc8cff; background: rgba(188,140,255,0.1); }
        .badge-Yedekleme { color: var(--backup); border-color: var(--backup); background: rgba(246,153,63,0.1); }
        .badge-Web { color: #2ea043; border-color: #2ea043; background: rgba(46,160,67,0.1); }
        .badge-Dizin { color: #f2ce44; border-color: #f2ce44; background: rgba(242,206,68,0.1); }

        .query-box {
            background: #000;
            padding: 12px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            margin: 12px 0;
            color: #d1d5db;
            border-left: 3px solid var(--primary);
            word-break: break-all;
        }

        .footer-links { display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { color: #8b949e; cursor: pointer; font-size: 13px; font-weight: 500; }
        .copy-btn:hover { color: white; text-decoration: underline; }
        .open-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }
        .open-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dork Sorgu</h1>
        <div class="subtitle">Siber Tehdit İstihbaratı ve Otomatize Dork Üretim Paneli</div>
    </div>

    <div class="search-container">
        <input type="text" id="target" placeholder="Hedef Domain (örn: ohu.edu.tr)">
        <select id="categoryFilter">
            <option value="all">Tüm Kategoriler</option>
            <option value="Giris">Giriş Panelleri</option>
            <option value="Dosya">Hassas Dosyalar</option>
            <option value="Sistem">Sistem Verileri</option>
            <option value="Hata">Hata Mesajları</option>
            <option value="Gizli">Gizli Veriler</option>
            <option value="Yedekleme">Yedeklemeler</option>
            <option value="Web">Web Parametreleri</option>
            <option value="Dizin">Açık Dizinler</option>
        </select>
        <button onclick="startAnalysis()">ANALİZ ET</button>
    </div>

    <div id="stats" class="stats-bar" style="display: none;">
        <div class="stat-card"><div id="totalCount" class="stat-value" style="color:var(--primary)">0</div><div class="stat-label">Toplam Dork</div></div>
        <div class="stat-card"><div id="criticalCount" class="stat-value" style="color:var(--danger)">0</div><div class="stat-label">Kritik/Gizli</div></div>
        <div class="stat-card"><div id="errorCount" class="stat-value" style="color:var(--warning)">0</div><div class="stat-label">Hata Analizi</div></div>
    </div>

    <div id="infoBox" class="info-note" style="display: none;">
        ⚠️ <strong>Bilgi:</strong> Aşağıdaki sorgular potansiyel zafiyet noktalarını temsil eder. Canlı sonuçları kontrol etmek için Google butonlarını kullanınız.
    </div>

    <div id="results"></div>
</div>

<script>
    async function startAnalysis() {
        const target = document.getElementById('target').value;
        const filter = document.getElementById('categoryFilter').value;
        const resultsDiv = document.getElementById('results');
        const infoBox = document.getElementById('infoBox');
        
        if(!target) return alert("Lütfen hedef domain girin!");

        resultsDiv.innerHTML = "<div style='text-align:center; padding:30px;'>Sorgular üretiliyor ve randomize ediliyor...</div>";
        infoBox.style.display = 'none';

        try {
            const res = await fetch(`http://localhost:8080/generate?domain=${target}`);
            const data = await res.json();
            
            document.getElementById('stats').style.display = 'grid';
            infoBox.style.display = 'block';
            
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('criticalCount').innerText = data.filter(d => d.category === 'Gizli').length;
            document.getElementById('errorCount').innerText = data.filter(d => d.category === 'Hata').length;

            resultsDiv.innerHTML = "";
            data.forEach(item => {
                if(filter !== "all" && item.category !== filter) return;

                resultsDiv.innerHTML += `
                    <div class="dork-card">
                        <span class="badge badge-${item.category}">${item.category}</span>
                        <div style="font-weight:bold; color:#f0f6fc;">${item.name}</div>
                        <div class="query-box">${item.query}</div>
                        <div class="footer-links">
                            <span class="copy-btn" onclick="copyToClipboard('${item.query}')">Sorguyu Kopyala</span>
                            <a href="${item.link}" target="_blank" class="open-link">Google'da Analiz Et →</a>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            resultsDiv.innerHTML = "<div style='color:var(--danger); text-align:center; padding:20px;'>Sunucu bağlantı hatası! Lütfen backend sunucusunun (Go) çalıştığından emin olun.</div>";
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Sorgu panoya kopyalandı!");
    }
</script>

</body>
</html>
